<!-- display -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>

    <style>
      .container div{
        width: 100px;
        height: 100px;
        border: 2px solid black;
        margin: 20px;
      }

      .container {
        display: flex;
        /* it will looks like inline
            but it is not inline, we decrease the size of browser in width 
                    will see the it try to adjust upto a certain level then gives scroll bar */

                    /* Now we want it to be next level, wrap it -- */
          
                    flex-wrap: wrap;
                    /* by default it is no wrap, we are using wrap */
                    /* wrap : means it automatically comes to next line when it reaches the border
                            (we don't want to loose orginal size of boxes thats why we are using ) */

                          /* without wrap it will shrink the content,
                          shrinking content should only happen only if it is bit more than the screen */
                          /* flex direction next page */
      }
    </style>
</head>
<body>
    
    <div class="container">
        <div>Box-1</div>
        <div>Box-2</div>
        <div>Box-3</div>
        <div>Box-4</div>
        <div>Box-5</div>
        <div>Box-6</div>
        <div>Box-7</div>
        <div>Box-8</div>
    </div>

</body>
</html>
