<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <body>

      <div class="card">

          <h2> Nike Casuals</h2>

          <p>Price : 5600.55</p>

        <div class="card-footer">
          <button>
            <span class="bi bi-cart4"> Add to Cart</span>

        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2> Shirt </h2>
        </div>

        <div class="card-body">
          <img src="assets/rightbanner1.png" width="200" height="200" alt="">

        </div>
        <div class="card-footer">
          <button>
            <span class="bi bi-cart4"> Add to Cart</span>
          </button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2> Shirt </h2>
        </div>

        <div class="card-body">
          <img src="assets/star.png" width="200" height="200" alt="">
          <p>Price : 5600.55</p>
        </div>
        <div class="card-footer">
          <button>
            <span class="bi bi-cart4"> Add to Cart</span>
          </button>
        </div>
      </div>

    </div>

   
</body>
</html>
