<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #parent {
            width: 300px;
            height: 300px;
            border: 2px solid black;

            /*  */
            position: static;
            margin-left: 100px;
        }
        #child {
            width: 100px;
            height: 100px;
            border: 1px solid red;

            /*  */
            /* position: static; */
            /* position: fixed; */
            position: relative;
            /* Imp */
            /* It will not stay inside the parent container, its position adjusted with regard to the parent container */

            /* left: 100px; */
            /* left: 500px; */

            left: 100px;
            top: 100px;
        }
    </style>
</head>
<body>
    <div id="parent">
        Parent Container
        <div id="child">
            Child Container
        </div>
    </div>


</body>
</html>
