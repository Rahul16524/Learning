<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopper Navbar</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    .navbar {
      padding: 20px 0;
      background-color: #f8f9fa;
    }

    .navbar-brand {
      font-weight: 600;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .nav-link {
      font-weight: 500;
      margin: 0 12px;
    }

    .icon-group i {
      font-size: 18px;
      margin-left: 18px;
      cursor: pointer;
    }

    .cart-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      font-size: 10px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">

    <!-- Brand -->
    <a class="navbar-brand" href="#">Shopper.</a>

    <!-- Toggle Button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Links -->
    <div class="collapse navbar-collapse justify-content-between" id="navbarNav">

      <!-- Center Menu -->
      <ul class="navbar-nav mx-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Catalog</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Shop</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Pages</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Docs</a></li>
      </ul>

      <!-- Icons -->
      <div class="d-flex align-items-center icon-group position-relative">
        <i class="bi bi-search"></i>
        <i class="bi bi-person"></i>
        <i class="bi bi-heart"></i>

        <div class="position-relative">
          <i class="bi bi-cart"></i>
          <span class="badge bg-danger rounded-pill cart-badge">2</span>
        </div>
      </div>

    </div>
  </div>
</nav>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
